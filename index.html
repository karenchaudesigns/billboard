<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Twitch Billboard</title>
    
    <!-- Load Twitch Chat Library (tmi.js) -->
    <script src="js/tmi.min.js"></script>
    <script src="js/marked.min.js"></script>
    <script src="js/purify.min.js"></script>
    
    <style>
        /* Phase 2: Core Frontend Styles */
        body {
            /* Transparent background is crucial for OBS overlays */
            background-color: transparent; 
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #billboard-container {
            /* Default Starting Dimensions */
            width: 800px;
            height: 200px;
            
            /* Visual Styling */
            background-color: #0f0f14; /* Opaque dark background */
            border: 4px solid #9146FF; /* Twitch Purple border */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            
            /* Flexbox to perfectly center the text */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
            
            /* Smooth animation when resizing */
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #billboard-text {
            color: #ffffff;
            font-weight: 800;
            text-align: center;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
            width: 100%;
            white-space: pre-wrap; /* Allows multiline wrapping if needed */
            word-break: normal;
            line-height: 1.1;
            margin: 0;
        }

        /* Helper message style for setup */
        #setup-warning {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Warning to show if the user forgot the ?channel URL parameter -->
    <div id="setup-warning">
        ⚠️ Missing Channel! Add "?channel=yourname" to the Browser Source URL in OBS.
    </div>

    <!-- The main billboard container -->
    <div id="billboard-container">
        <div id="billboard-text">Waiting for command...</div>
    </div>

    <script>
        // --- PHASE 1 & 2: Initialization and Text Auto-Fitting ---
        
        function fitText() {
            const container = document.getElementById('billboard-container');
            const textEl = document.getElementById('billboard-text');

            const style = window.getComputedStyle(container);
            const paddingLeft = parseFloat(style.paddingLeft);
            const paddingRight = parseFloat(style.paddingRight);
            const paddingTop = parseFloat(style.paddingTop);
            const paddingBottom = parseFloat(style.paddingBottom);

            const maxW = container.clientWidth - paddingLeft - paddingRight;
            const maxH = container.clientHeight - paddingTop - paddingBottom;

            let minSize = 1;
            let maxSize = 1000;
            let optimalSize = minSize;

            while (minSize <= maxSize) {
                const midSize = Math.floor((minSize + maxSize) / 2);
                textEl.style.fontSize = midSize + 'px';

                if (textEl.scrollWidth <= maxW && textEl.scrollHeight <= maxH) {
                    optimalSize = midSize;
                    minSize = midSize + 1;
                } else {
                    maxSize = midSize - 1;
                }
            }

            textEl.style.fontSize = optimalSize + 'px';
        }

        const resizeObserver = new ResizeObserver(() => {
            fitText();
        });
        resizeObserver.observe(document.getElementById('billboard-container'));

        // --- PHASE 3: Twitch Chat Integration ---

        // Billboard Slides State
        let slides = [];
        let currentSlideIndex = 0;
        let slideInterval = null;

        const defaultText = 'Welcome to the pond!';
        const defaultBg = '#8b4513';
        const defaultFg = '#ffffff';

        function renderSlide() {
            if (slides.length === 0) return;
            const container = document.getElementById('billboard-container');
            const textEl = document.getElementById('billboard-text');
            const slide = slides[currentSlideIndex];

            container.style.backgroundColor = slide.bg;
            textEl.style.color = slide.fg;
            textEl.innerHTML = slide.text; // DOMPurify etc. are applied during setting
            fitText();
        }

        function resetRotation() {
            if (slideInterval) {
                clearInterval(slideInterval);
            }
            if (slides.length > 1) {
                slideInterval = setInterval(() => {
                    currentSlideIndex = (currentSlideIndex + 1) % slides.length;
                    renderSlide();
                }, 10000); // 10 seconds per slide
            } else {
                slideInterval = null; // No rotation needed for single slide
            }
        }

        // Grab the channel name from the OBS Browser Source URL parameters
        // Example: https://your-site.github.io/index.html?channel=shroud
        const urlParams = new URLSearchParams(window.location.search);
        const channelName = urlParams.get('channel');
        const initialWidth = urlParams.get('width');
        const initialHeight = urlParams.get('height');
        const initialText = urlParams.get('text');
        let initialBg = urlParams.get('bg');
        let initialFg = urlParams.get('fg');

        const container = document.getElementById('billboard-container');
        const textEl = document.getElementById('billboard-text');

        if (initialWidth) {
            const width = parseInt(initialWidth, 10);
            if (!isNaN(width)) {
                container.style.width = Math.max(100, Math.min(width, 1920)) + 'px';
            }
        }
        if (initialHeight) {
            const height = parseInt(initialHeight, 10);
            if (!isNaN(height)) {
                container.style.height = Math.max(50, Math.min(height, 1080)) + 'px';
            }
        }
        if (initialBg) {
            if (!initialBg.startsWith('#') && /^[0-9A-Fa-f]{3,6}$/.test(initialBg)) {
                initialBg = '#' + initialBg;
            }
            container.style.backgroundColor = initialBg;
        }
        if (initialFg) {
            if (!initialFg.startsWith('#') && /^[0-9A-Fa-f]{3,6}$/.test(initialFg)) {
                initialFg = '#' + initialFg;
            }
            textEl.style.color = initialFg;
        }

        slides = [{
            text: initialText ? DOMPurify.sanitize(marked.parse(initialText.replace(/;/g, '  \n'))) : defaultText,
            bg: initialBg || defaultBg,
            fg: initialFg || defaultFg
        }];
        // Apply default colors to DOM if URL didn't specify them
        if (!initialBg) container.style.backgroundColor = defaultBg;
        if (!initialFg) textEl.style.color = defaultFg;

        if (!channelName) {
            document.getElementById('setup-warning').style.display = 'block';
            textEl.innerText = initialText ? initialText : 'SETUP REQUIRED';
            fitText();
        } else {
            // Configure tmi.js client
            const client = new tmi.Client({
                connection: {
                    secure: true,
                    reconnect: true
                },
                channels: [channelName]
            });

            client.connect().then(() => {
                console.log(`Connected to Twitch chat: #${channelName}`);
                renderSlide();
                resetRotation();
            }).catch(console.error);

            // Listen for incoming messages
            client.on('message', (channel, tags, message, self) => {
                // Ignore messages from the bot itself (if authenticated)
                if (self) return;

                // --- PHASE 4: Security and Guardrails ---
                
                // 1. Permission Checks: Only Broadcaster and Mods can use commands
                const isBroadcaster = tags.badges && tags.badges.broadcaster === '1';
                const isMod = tags.mod === true;
                
                if (!isBroadcaster && !isMod) {
                    return; // Ignore regular viewers
                }

                // 1.5 Command Parsing: !bb+ and !bb-
                if (message.toLowerCase() === '!bb+') {
                    slides.push({ text: defaultText, bg: defaultBg, fg: defaultFg });
                    currentSlideIndex = slides.length - 1;
                    renderSlide();
                    resetRotation();
                }

                if (message.toLowerCase() === '!bb-') {
                    slides.splice(currentSlideIndex, 1);
                    if (slides.length === 0) {
                        slides = [{
                            text: initialText ? DOMPurify.sanitize(marked.parse(initialText.replace(/;/g, '  \n'))) : defaultText,
                            bg: initialBg || defaultBg,
                            fg: initialFg || defaultFg
                        }];
                    }
                    if (currentSlideIndex >= slides.length) {
                        currentSlideIndex = slides.length - 1;
                    }
                    renderSlide();
                    resetRotation();
                }

                // 2. Command Parsing: !bbt (formerly !billboardtext)
                if (message.toLowerCase().startsWith('!bbt ')) {
                    let newText = message.slice(5).trim(); // Extract text after command
                    if (newText.length > 0) {
                        // Replace ';' with markdown line breaks '  \n' and parse markdown
                        newText = newText.replace(/;/g, '  \n');
                        const parsedText = marked.parse(newText);
                        const cleanText = DOMPurify.sanitize(parsedText);
                        slides[currentSlideIndex].text = cleanText;
                        renderSlide();
                        resetRotation();
                    }
                }

                // 3. Command Parsing: !bbs (formerly !billboardsize)
                if (message.toLowerCase().startsWith('!bbs ')) {
                    const sizeStr = message.slice(5).trim();
                    const dimensions = sizeStr.split('x'); // e.g. ["1920", "1080"]
                    
                    if (dimensions.length === 2) {
                        const width = parseInt(dimensions[0], 10);
                        const height = parseInt(dimensions[1], 10);

                        // Size Limits to prevent crashing OBS
                        if (!isNaN(width) && !isNaN(height)) {
                            const clampedWidth = Math.max(100, Math.min(width, 1920));
                            const clampedHeight = Math.max(50, Math.min(height, 1080));

                            const container = document.getElementById('billboard-container');
                            container.style.width = clampedWidth + 'px';
                            container.style.height = clampedHeight + 'px';
                            
                            // Re-fit text once the container has animated to the new size
                            fitText();
                        }
                    }
                }

                // 4. Command Parsing: !billboard or !bbhelp
                if (message.toLowerCase() === '!billboard' || message.toLowerCase() === '!bbhelp') {
                    client.say(channel, 'Commands: !bb+, !bb-, !bbt <text>, !bbs <WxH>, !bbbg <color>, !bbfg <color>, !bboutline <color|none>');
                }

                // 5. Command Parsing: !bbbg
                if (message.toLowerCase().startsWith('!bbbg ')) {
                    let color = message.slice(6).trim();
                    if (color.length > 0) {
                        // If color doesn't start with # and looks like a hex code (e.g. 000000)
                        if (!color.startsWith('#') && /^[0-9A-Fa-f]{3,6}$/.test(color)) {
                            color = '#' + color;
                        }
                        slides[currentSlideIndex].bg = color;
                        renderSlide();
                        resetRotation();
                    }
                }

                // 5.5 Command Parsing: !bbfg
                if (message.toLowerCase().startsWith('!bbfg ')) {
                    let color = message.slice(6).trim();
                    if (color.length > 0) {
                        // If color doesn't start with # and looks like a hex code (e.g. 000000)
                        if (!color.startsWith('#') && /^[0-9A-Fa-f]{3,6}$/.test(color)) {
                            color = '#' + color;
                        }
                        slides[currentSlideIndex].fg = color;
                        renderSlide();
                        resetRotation();
                    }
                }

                // 6. Command Parsing: !bboutline
                if (message.toLowerCase().startsWith('!bboutline ')) {
                    let color = message.slice(11).trim();
                    if (color.length > 0) {
                        if (color.toLowerCase() === 'none') {
                            document.getElementById('billboard-container').style.border = 'none';
                        } else {
                            if (!color.startsWith('#') && /^[0-9A-Fa-f]{3,6}$/.test(color)) {
                                color = '#' + color;
                            }
                            document.getElementById('billboard-container').style.border = `4px solid ${color}`;
                        }
                        fitText(); // Border changes might affect inner dimensions slightly
                    }
                }
            });
        }
    </script>
</body>
</html>
